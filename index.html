<!DOCTYPE html>
<html>
<head>
  <title>CIT 140 Program 5</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/handlebars.js/4.7.7/handlebars.min.js"></script>
</head>

<body>

<h2>Student Filter</h2>

<button onclick="showData('CIT')">CIT Majors</button>
<button onclick="showData('BUS')">Business Majors</button>

<div id="result"></div>

<!-- Handlebars template -->
<script id="template" type="text/x-handlebars-template">
  <table border="1">
    <tr>
      <th>Name</th>
      <th>Major</th>
      <th>Midterm</th>
      <th>Final</th>
    </tr>

    {{#each rows}}
    <tr>
      <td>{{name}}</td>
      <td>{{major}}</td>
      <td>{{midterm}}</td>
      <td>{{final}}</td>
    </tr>
    {{/each}}

  </table>
</script>

<script>
async function showData(major) {
  let response = await fetch("cit5students.json");
  let data = await response.json();

  let filtered = data.filter(s => s.major === major);

  let source = document.getElementById("template").innerHTML;
  let template = Handlebars.compile(source);
  let html = template({ rows: filtered });

  document.getElementById("result").innerHTML = html;
}
</script>

</body>
</html>
