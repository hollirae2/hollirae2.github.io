<!DOCTYPE html>
<html>
<head>
  <title>Program 5</title>

  <!-- Handlebars CDN -->
  <script src="https://cdn.jsdelivr.net/npm/handlebars@latest/dist/handlebars.js"></script>

  <style>
    body {
      font-family: Arial;
    }

    table {
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      border: 1px solid black;
      padding: 8px;
    }

    button {
      margin-right: 10px;
      padding: 5px 10px;
    }
  </style>
</head>

<body>

  <h2>Select a Major</h2>

  <button onclick="loadData('CIT')">CIT Majors</button>
  <button onclick="loadData('BUS')">Business Majors</button>

  <p>We filter our dataset by major</p>

  <div id="output"></div>

  <script id="table-template" type="text/x-handlebars-template">
    <table>
      <tr>
        <th>Name</th>
        <th>Major</th>
        <th>Midterm</th>
        <th>Final</th>
      </tr>
      {{#each students}}
      <tr>
        <td>{{name}}</td>
        <td>{{major}}</td>
        <td>{{midterm}}</td>
        <td>{{final}}</td>
      </tr>
      {{/each}}
    </table>
  </script>

  <script>
    function loadData(majorType) {
      fetch('cit5students.json')
        .then(response => response.json())
        .then(data => {

          let filtered = data.filter(student => student.major === majorType);
          let source = document.getElementById("table-template").innerHTML;
          let template = Handlebars.compile(source);
          let html = template({ students: filtered });
          
          document.getElementById("output").innerHTML = html;
        })
        .catch(error => console.log("Error loading JSON:", error));
    }
  </script>

</body>
</html>
